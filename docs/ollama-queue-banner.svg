<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="720" viewBox="0 0 1600 720" role="img" aria-labelledby="title desc">
  <title id="title">Model-affine queue keeps one Ollama model hot</title>
  <desc id="desc">Interleaved requests are grouped by model. The scheduler drains the active model while its weights and KV cache stay warm, then switches deliberately. The model-affine schedule uses less total time than naive model switching.</desc>

  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0" stop-color="#06101d"/>
      <stop offset="0.58" stop-color="#0a1830"/>
      <stop offset="1" stop-color="#111b38"/>
    </linearGradient>
    <linearGradient id="panel" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0" stop-color="#142746" stop-opacity=".96"/>
      <stop offset="1" stop-color="#0d1a31" stop-opacity=".96"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0" stop-color="#a5f3fc"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="violet" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0" stop-color="#ddd6fe"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0" stop-color="#bbf7d0"/>
      <stop offset="1" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0" stop-color="#fed7aa"/>
      <stop offset="1" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="saved" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0" stop-color="#34d399" stop-opacity=".85"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity=".35"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#c7d2fe" stroke-opacity=".055"/>
    </pattern>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="9" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#020617" flood-opacity=".45"/>
    </filter>
    <style><![CDATA[
      .font { font-family: Inter, Segoe UI, Arial, sans-serif; }
      .title { fill: #f8fafc; font-size: 46px; font-weight: 800; letter-spacing: 1px; }
      .subtitle { fill: #9fb3d4; font-size: 21px; font-weight: 500; }
      .eyebrow { fill: #91a6c9; font-size: 14px; font-weight: 750; letter-spacing: 1.8px; }
      .panel-title { fill: #eef5ff; font-size: 17px; font-weight: 800; letter-spacing: 1.1px; }
      .panel-subtitle { fill: #91a6c9; font-size: 15px; font-weight: 500; }
      .tiny { fill: #7f95b8; font-size: 13px; font-weight: 650; letter-spacing: .8px; }
      .motion { animation: breathe 2.6s ease-in-out infinite; }
      .dash-motion { animation: dash 2.4s linear infinite; }
      .warm-pulse { animation: warm 1.8s ease-in-out infinite; }
      @keyframes breathe { 0%, 100% { opacity: .45; } 50% { opacity: 1; } }
      @keyframes warm { 0%, 100% { opacity: .55; } 50% { opacity: 1; } }
      @keyframes dash { to { stroke-dashoffset: -36; } }
    ]]></style>
  </defs>

  <rect width="1600" height="720" rx="32" fill="#081322"/>
  <rect width="1600" height="720" rx="32" fill="url(#grid)"/>
  <circle cx="1450" cy="30" r="250" fill="#7c3aed" opacity=".14" filter="url(#glow)"/>
  <circle cx="80" cy="700" r="240" fill="#06b6d4" opacity=".10" filter="url(#glow)"/>

  <g class="font">
    <text x="64" y="76" class="title">MODEL-AFFINE QUEUE</text>
    <text x="66" y="112" class="subtitle">Group by model. Keep the active weights and KV cache warm.</text>
    <g transform="translate(1300 53)">
      <rect width="236" height="38" rx="19" fill="#102c3a" stroke="#34d399" stroke-opacity=".45"/>
      <circle cx="22" cy="19" r="6" fill="#34d399" class="warm-pulse"/>
      <text x="38" y="25" fill="#a7f3d0" font-size="13" font-weight="800" letter-spacing="1">NO MODEL HOPPING</text>
    </g>

    <!-- 1. Mixed arrival -->
    <g filter="url(#shadow)">
      <rect x="64" y="156" width="298" height="304" rx="24" fill="#0e1a2d" stroke="#2b4b77" stroke-width="2"/>
      <text x="90" y="193" class="eyebrow">01 / MIXED ARRIVAL</text>
      <text x="90" y="219" class="panel-subtitle">Requests arrive interleaved.</text>
      <g transform="translate(90 244)">
        <rect width="246" height="36" rx="12" fill="#10213b" stroke="#2b4b77"/>
        <rect width="72" height="36" rx="12" fill="#22d3ee"/>
        <text x="22" y="24" fill="#062238" font-size="14" font-weight="850">QWEN</text>
        <text x="92" y="24" fill="#dbeafe" font-size="15" font-weight="650">req-01</text>
      </g>
      <g transform="translate(90 288)">
        <rect width="246" height="36" rx="12" fill="#10213b" stroke="#2b4b77"/>
        <rect width="72" height="36" rx="12" fill="#8b5cf6"/>
        <text x="17" y="24" fill="#211343" font-size="14" font-weight="850">LLAMA</text>
        <text x="92" y="24" fill="#dbeafe" font-size="15" font-weight="650">req-02</text>
      </g>
      <g transform="translate(90 332)">
        <rect width="246" height="36" rx="12" fill="#10213b" stroke="#2b4b77"/>
        <rect width="72" height="36" rx="12" fill="#22d3ee"/>
        <text x="22" y="24" fill="#062238" font-size="14" font-weight="850">QWEN</text>
        <text x="92" y="24" fill="#dbeafe" font-size="15" font-weight="650">req-03</text>
      </g>
      <g transform="translate(90 376)">
        <rect width="246" height="36" rx="12" fill="#10213b" stroke="#2b4b77"/>
        <rect width="72" height="36" rx="12" fill="#f97316"/>
        <text x="13" y="24" fill="#431407" font-size="14" font-weight="850">MISTRAL</text>
        <text x="92" y="24" fill="#dbeafe" font-size="15" font-weight="650">req-04</text>
      </g>
      <g transform="translate(90 420)">
        <rect width="246" height="36" rx="12" fill="#10213b" stroke="#2b4b77"/>
        <rect width="72" height="36" rx="12" fill="#22d3ee"/>
        <text x="22" y="24" fill="#062238" font-size="14" font-weight="850">QWEN</text>
        <text x="92" y="24" fill="#dbeafe" font-size="15" font-weight="650">req-05</text>
      </g>
    </g>

    <!-- Animated request stream -->
    <path d="M368 263C384 263 384 263 402 263M368 307C384 307 384 307 402 307M368 351C384 351 384 351 402 351M368 395C384 395 384 395 402 395" fill="none" stroke="#53729f" stroke-opacity=".35" stroke-width="2" stroke-dasharray="5 8"/>
    <g class="motion">
      <circle cx="368" cy="263" r="5" fill="url(#cyan)"><animate attributeName="cx" values="368;410" dur="2.8s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;1;0" dur="2.8s" repeatCount="indefinite"/></circle>
      <circle cx="368" cy="307" r="5" fill="url(#violet)"><animate attributeName="cx" values="368;410" dur="2.8s" begin=".7s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;1;0" dur="2.8s" begin=".7s" repeatCount="indefinite"/></circle>
      <circle cx="368" cy="351" r="5" fill="url(#cyan)"><animate attributeName="cx" values="368;410" dur="2.8s" begin="1.4s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;1;0" dur="2.8s" begin="1.4s" repeatCount="indefinite"/></circle>
      <circle cx="368" cy="395" r="5" fill="url(#orange)"><animate attributeName="cx" values="368;410" dur="2.8s" begin="2.1s" repeatCount="indefinite"/><animate attributeName="opacity" values="0;1;0" dur="2.8s" begin="2.1s" repeatCount="indefinite"/></circle>
    </g>
    <path d="M376 470h20" stroke="#53729f" stroke-width="2"/>
    <text x="402" y="475" class="tiny">ROUTE BY MODEL</text>

    <!-- 2. Affinity scheduler -->
    <g filter="url(#shadow)">
      <rect x="418" y="156" width="552" height="304" rx="24" fill="#0e1a2d" stroke="#3b5f92" stroke-width="2"/>
      <text x="446" y="193" class="eyebrow">02 / AFFINITY SCHEDULER</text>
      <text x="446" y="219" class="panel-subtitle">Same model shares one warm window.</text>
      <rect x="790" y="177" width="174" height="30" rx="15" fill="#123a3d" stroke="#34d399" stroke-opacity=".42"/>
      <circle cx="809" cy="192" r="5" fill="#34d399"/>
      <text x="823" y="197" fill="#a7f3d0" font-size="12" font-weight="800" letter-spacing=".8">DRAIN THEN SWITCH</text>

      <text x="446" y="269" fill="#b9c9e4" font-size="15" font-weight="800">QWEN</text>
      <text x="446" y="289" class="tiny">3 WAITING</text>
      <rect x="548" y="239" width="382" height="58" rx="16" fill="#10213b" stroke="#2b4b77"/>
      <rect x="565" y="251" width="98" height="34" rx="10" fill="#22d3ee"/>
      <rect x="675" y="251" width="98" height="34" rx="10" fill="#22d3ee"/>
      <rect x="785" y="251" width="98" height="34" rx="10" fill="#22d3ee"/>
      <text x="604" y="274" fill="#062238" font-size="14" font-weight="850">Q</text>
      <text x="714" y="274" fill="#062238" font-size="14" font-weight="850">Q</text>
      <text x="824" y="274" fill="#062238" font-size="14" font-weight="850">Q</text>

      <text x="446" y="323" fill="#b9c9e4" font-size="15" font-weight="800">LLAMA</text>
      <text x="446" y="343" class="tiny">1 WAITING</text>
      <rect x="548" y="293" width="382" height="58" rx="16" fill="#10213b" stroke="#2b4b77"/>
      <rect x="565" y="305" width="98" height="34" rx="10" fill="#8b5cf6"/>
      <text x="604" y="328" fill="#211343" font-size="14" font-weight="850">L</text>

      <text x="446" y="377" fill="#b9c9e4" font-size="15" font-weight="800">MISTRAL</text>
      <text x="446" y="397" class="tiny">1 WAITING</text>
      <rect x="548" y="347" width="382" height="58" rx="16" fill="#10213b" stroke="#2b4b77"/>
      <rect x="565" y="359" width="98" height="34" rx="10" fill="#f97316"/>
      <text x="604" y="382" fill="#431407" font-size="14" font-weight="850">M</text>

      <rect x="430" y="237" width="6" height="62" rx="3" fill="#10b981" filter="url(#glow)">
        <animate attributeName="y" values="237;237;291;291;345;345;237" keyTimes="0;.27;.31;.60;.64;.92;1" dur="7.2s" repeatCount="indefinite"/>
      </rect>
      <text x="446" y="432" class="tiny">GROUPED WORK STAYS TOGETHER</text>
    </g>

    <!-- Animated scheduler-to-Ollama connection -->
    <path d="M976 307H1005" stroke="#6d82a9" stroke-width="3" stroke-dasharray="8 10" class="dash-motion"/>
    <path d="m997 294 20 13-20 13" fill="none" stroke="url(#green)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="967" y="284" text-anchor="end" class="tiny">DRAIN</text>

    <!-- 3. One hot model -->
    <g filter="url(#shadow)">
      <rect x="1020" y="156" width="516" height="304" rx="24" fill="#0e1a2d" stroke="#3b5f92" stroke-width="2"/>
      <text x="1048" y="193" class="eyebrow">03 / ONE MODEL LOADED</text>
      <text x="1048" y="219" class="panel-subtitle">Drain the active batch before the next swap.</text>
      <g>
        <rect x="1048" y="244" width="460" height="108" rx="20" fill="#0b172b" stroke="#34d399" stroke-opacity=".28"/>
        <rect x="1068" y="264" width="72" height="68" rx="17" fill="#22d3ee"/>
        <text x="1093" y="306" fill="#062238" font-size="25" font-weight="900">Q</text>
        <text x="1160" y="286" fill="#f8fafc" font-size="24" font-weight="850">QWEN3:4B</text>
        <text x="1160" y="313" fill="#89a3c9" font-size="14" font-weight="750" letter-spacing="1">ACTIVE MODEL WINDOW</text>
        <circle cx="1474" cy="270" r="7" fill="#34d399" class="warm-pulse"/>
        <text x="1490" y="291" text-anchor="end" fill="#a7f3d0" font-size="12" font-weight="850" letter-spacing=".8">LOADED</text>
      </g>
      <g transform="translate(1048 376)">
        <rect width="210" height="48" rx="15" fill="#12383b" stroke="#34d399" stroke-opacity=".42"/>
        <circle cx="25" cy="24" r="10" fill="none" stroke="#6ee7b7" stroke-width="3" stroke-dasharray="18 8" class="dash-motion"/>
        <text x="48" y="21" fill="#a7f3d0" font-size="12" font-weight="800" letter-spacing=".8">KV CACHE</text>
        <text x="48" y="37" fill="#ecfdf5" font-size="15" font-weight="850">WARM AND REUSED</text>
      </g>
      <text x="1282" y="386" class="tiny">MODEL ROTATION</text>
      <text x="1282" y="410" fill="#dbeafe" font-size="14" font-weight="800">QWEN  →  LLAMA  →  MISTRAL</text>
      <path d="M1282 426H1500" stroke="#2b4b77" stroke-width="2"/>
      <circle cx="1282" cy="426" r="4" fill="#34d399" filter="url(#glow)">
        <animate attributeName="cx" values="1282;1390;1500;1282" dur="7.2s" repeatCount="indefinite"/>
      </circle>
      <text x="1048" y="449" class="tiny">ONE MODEL LOADED AT A TIME</text>
    </g>

    <!-- Bottom comparison -->
    <g>
      <rect x="64" y="492" width="1472" height="184" rx="24" fill="#0a172b" stroke="#27466f" stroke-width="2"/>
      <text x="90" y="526" class="eyebrow">WHY THE TOTAL TIME FALLS</text>
      <text x="90" y="550" class="panel-subtitle">Same mixed requests. Fewer expensive model reloads.</text>
      <text x="1450" y="534" text-anchor="end" fill="#6ee7b7" font-size="13" font-weight="850" letter-spacing="1">LESS WALL TIME</text>

      <circle cx="94" cy="579" r="5" fill="#fb7185"/>
      <text x="110" y="584" fill="#fda4af" font-size="15" font-weight="850" letter-spacing=".7">NAIVE SWITCHING</text>
      <text x="110" y="604" class="tiny">reload on every model hop</text>
      <rect x="390" y="560" width="1050" height="48" rx="14" fill="#0e1a2d" stroke="#233d62"/>
      <rect x="390" y="560" width="74" height="48" rx="14" fill="#26344e"/>
      <rect x="464" y="560" width="124" height="48" fill="#22d3ee"/>
      <rect x="588" y="560" width="74" height="48" fill="#26344e"/>
      <rect x="662" y="560" width="124" height="48" fill="#8b5cf6"/>
      <rect x="786" y="560" width="74" height="48" fill="#26344e"/>
      <rect x="860" y="560" width="124" height="48" fill="#22d3ee"/>
      <rect x="984" y="560" width="74" height="48" fill="#26344e"/>
      <rect x="1058" y="560" width="124" height="48" fill="#f97316"/>
      <rect x="1182" y="560" width="74" height="48" fill="#26344e"/>
      <rect x="1256" y="560" width="124" height="48" fill="#22d3ee"/>
      <rect x="1380" y="560" width="60" height="48" rx="14" fill="#26344e"/>
      <text x="427" y="590" text-anchor="middle" fill="#cbd5e1" font-size="12" font-weight="850">LOAD</text>
      <text x="526" y="590" text-anchor="middle" fill="#062238" font-size="14" font-weight="900">Q</text>
      <text x="625" y="590" text-anchor="middle" fill="#cbd5e1" font-size="12" font-weight="850">LOAD</text>
      <text x="724" y="590" text-anchor="middle" fill="#211343" font-size="14" font-weight="900">L</text>
      <text x="823" y="590" text-anchor="middle" fill="#cbd5e1" font-size="12" font-weight="850">LOAD</text>
      <text x="922" y="590" text-anchor="middle" fill="#062238" font-size="14" font-weight="900">Q</text>
      <text x="1021" y="590" text-anchor="middle" fill="#cbd5e1" font-size="12" font-weight="850">LOAD</text>
      <text x="1120" y="590" text-anchor="middle" fill="#431407" font-size="14" font-weight="900">M</text>
      <text x="1219" y="590" text-anchor="middle" fill="#cbd5e1" font-size="12" font-weight="850">LOAD</text>
      <text x="1318" y="590" text-anchor="middle" fill="#062238" font-size="14" font-weight="900">Q</text>

      <circle cx="94" cy="646" r="5" fill="#34d399"/>
      <text x="110" y="651" fill="#a7f3d0" font-size="15" font-weight="850" letter-spacing=".7">MODEL-AFFINE BATCHING</text>
      <text x="110" y="671" class="tiny">group first, then switch twice</text>
      <rect x="390" y="626" width="1050" height="48" rx="14" fill="#0e1a2d" stroke="#233d62"/>
      <rect x="390" y="626" width="310" height="48" rx="14" fill="#22d3ee"/>
      <rect x="700" y="626" width="58" height="48" fill="#1c3446"/>
      <rect x="758" y="626" width="190" height="48" fill="#8b5cf6"/>
      <rect x="948" y="626" width="58" height="48" fill="#1c3446"/>
      <rect x="1006" y="626" width="180" height="48" rx="14" fill="#f97316"/>
      <rect x="1186" y="626" width="254" height="48" rx="14" fill="url(#saved)" fill-opacity=".12" stroke="#34d399" stroke-opacity=".35" stroke-dasharray="7 8"/>
      <text x="545" y="656" text-anchor="middle" fill="#062238" font-size="14" font-weight="900">QWEN ×3</text>
      <text x="729" y="656" text-anchor="middle" fill="#bbf7d0" font-size="11" font-weight="850">SWAP</text>
      <text x="853" y="656" text-anchor="middle" fill="#211343" font-size="14" font-weight="900">LLAMA</text>
      <text x="977" y="656" text-anchor="middle" fill="#bbf7d0" font-size="11" font-weight="850">SWAP</text>
      <text x="1096" y="656" text-anchor="middle" fill="#431407" font-size="14" font-weight="900">MISTRAL</text>
      <text x="1313" y="656" text-anchor="middle" fill="#6ee7b7" font-size="13" font-weight="900" letter-spacing="1">TIME SAVED</text>
      <rect x="390" y="626" width="796" height="48" rx="14" fill="none" stroke="#6ee7b7" stroke-opacity=".55" stroke-dasharray="10 10" class="dash-motion"/>
    </g>
  </g>
</svg>
